<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THUHI MD PAIRING</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .logo-area {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            object-fit: cover;
        }

        h1 {
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #00ff88;
            color: #0f172a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            background: #00e177;
            transform: translateY(-2px);
        }

        /* කෝඩ් එක සහ විස්තර පෙන්නන ප්‍රධාන කොටුව */
        #statusBox {
            width: 100%;
            min-height: 80px;
            border: 2px dashed #334155;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <!-- ඔයාගේ කරාටි ලෝගෝ එක -->
        <img class="logo-img" src="https://i.ibb.co/7xWx6q4N/image.png" alt="THUHI MD">
    </div>

    <h1>THUHI MD</h1>
    <p>පහතින් ඔයාගේ WhatsApp අංකය රටේ කේතය (94...) සමඟ ඇතුළත් කර Pairing Code එක ලබාගන්න.</p>

    <!-- නම්බර් එක ගහන තැන -->
    <input type="number" id="phoneNumber" placeholder="94701153310" value="94701153310">

    <!-- බටන් එක -->
    <button onclick="getPairingCode()">GET PAIRING CODE</button>

    <!-- කෝඩ් එක මැජික් එකක් වගේ මැදින් මතුවන කොටුව -->
    <div id="statusBox">
        <span style="color: #64748b; font-size: 14px;">කෝඩ් එක ලබාගැනීමට බටන් එක ඔබන්න.</span>
    </div>
</div>

<script>
    async function getPairingCode() {
        const numberInput = document.getElementById('phoneNumber').value;
        const statusBox = document.getElementById('statusBox');

        if (!numberInput) {
            statusBox.innerHTML = "<span style='color: #ef4444; font-weight: bold;'>කරුණාකර නම්බර් එකක් ඇතුළත් කරන්න!</span>";
            return;
        }

        // බටන් එක එබුව ගමන් කොටුව ඇතුළේ වෙනස් වෙනවා
        statusBox.style.borderColor = "#eab308";
        statusBox.innerHTML = "<span style='color: #eab308; font-weight: bold;'>කෝඩ් එක සකසමින් පවතී. කරුණාකර රැඳී සිටින්න... ⏳</span>";

        try {
            const response = await fetch(`/code?number=${numberInput}`);
            const data = await response.json();

            if (data.code) {
                statusBox.style.borderColor = "#00ff88";
                statusBox.innerHTML = `
                    <div style="font-size: 28px; font-weight: bold; color: #00ff88; letter-spacing: 4px; margin-bottom: 5px;">
                        ${data.code}
                    </div>
                    <span style="font-size: 11px; color: #94a3b8;">↑ මේ කෝඩ් එක ඉක්මනින් කොපි කරගෙන WhatsApp ලින්ක් කරන්න!</span>
                `;
            } else if (data.error) {
                statusBox.style.borderColor = "#ef4444";
                statusBox.innerHTML = `<span style='color: #ef4444; font-weight: bold;'>${data.error}</span>`;
            }
        } catch (error) {
            statusBox.style.borderColor = "#ef4444";
            statusBox.innerHTML = "<span style='color: #ef4444; font-weight: bold;'>සර්වර් එක සම්බන්ධ කරගන්න බැරි වුණා. පසුව උත්සාහ කරන්න!</span>";
        }
    }
</script>

</body>
</html>
